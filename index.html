<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matteøving</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        @media (min-width: 768px) {
            body {
                padding: 20px;
            }

            .container {
                padding: 30px;
            }
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        @media (min-width: 768px) {
            h1 {
                font-size: 2.5em;
                margin-bottom: 30px;
            }
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        @media (min-width: 768px) {
            .controls {
                gap: 15px;
                margin-bottom: 30px;
                padding: 20px;
            }
        }

        .button {
            padding: 10px 16px;
            font-size: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            flex: 1 1 auto;
            min-width: 120px;
        }

        @media (min-width: 768px) {
            .button {
                padding: 12px 24px;
                font-size: 16px;
                flex: 0 1 auto;
                min-width: auto;
            }
        }

        .button-primary {
            background: #667eea;
            color: white;
        }

        .button-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .button-secondary {
            background: #48bb78;
            color: white;
        }

        .button-secondary:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        .settings {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .settings label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            cursor: pointer;
            padding: 6px 10px;
            background: white;
            border-radius: 6px;
            transition: background 0.2s;
        }

        @media (min-width: 768px) {
            .settings label {
                gap: 8px;
                font-size: 16px;
                padding: 8px 15px;
            }
        }

        .settings label:hover {
            background: #e2e8f0;
        }

        .settings input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .problems-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        @media (min-width: 480px) {
            .problems-container {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 15px;
            }
        }

        @media (min-width: 768px) {
            .problems-container {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 20px;
                margin-top: 20px;
            }
        }

        .problem {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #2d3748;
            border: 3px solid #e2e8f0;
            transition: all 0.3s;
        }

        @media (min-width: 768px) {
            .problem {
                padding: 20px;
                font-size: 24px;
            }
        }

        .problem:hover {
            border-color: #667eea;
            transform: scale(1.05);
        }

        .problem.line-format {
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
        }

        @media (min-width: 768px) {
            .problem.line-format {
                font-size: 24px;
                gap: 8px;
            }
        }

        .line-answer {
            min-width: 30px;
            text-align: center;
        }

        @media (min-width: 768px) {
            .line-answer {
                min-width: 40px;
            }
        }

        .line-answer.hidden {
            color: transparent;
            user-select: none;
        }

        .problem.vertical-format {
            background: white;
            border: 3px solid #2d3748;
            border-radius: 10px;
            padding: 15px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            font-family: 'Courier New', monospace;
        }

        @media (min-width: 768px) {
            .problem.vertical-format {
                padding: 20px;
                min-height: 150px;
            }
        }

        .vertical-row {
            font-size: 24px;
            font-weight: bold;
            line-height: 1.4;
            text-align: right;
            width: 100%;
        }

        @media (min-width: 768px) {
            .vertical-row {
                font-size: 32px;
            }
        }

        .vertical-top {
            padding-right: 10px;
        }

        .vertical-operation {
            padding-right: 10px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 5px;
        }

        .vertical-line {
            width: 100%;
            height: 3px;
            background: #2d3748;
            margin: 8px 0;
        }

        .vertical-answer {
            padding-right: 10px;
            min-height: 35px;
        }

        @media (min-width: 768px) {
            .vertical-answer {
                min-height: 45px;
            }
        }

        .vertical-answer.hidden {
            color: transparent;
            user-select: none;
        }

        .info {
            text-align: center;
            margin-top: 20px;
            color: #718096;
            font-style: italic;
        }

        @media (max-width: 479px) {
            .problems-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Matteøving</h1>

        <div class="controls">
            <button class="button button-primary" onclick="toggleFormat()">
                📝 Bytt format
            </button>
            <button class="button button-secondary" onclick="generateProblems()">
                🎲 Nye oppgaver
            </button>
            <button class="button button-primary" onclick="toggleAnswers()">
                👁️ VIS svar
            </button>
        </div>

        <div class="controls">
            <div class="settings">
                <label>
                    <input type="checkbox" id="addition" checked onchange="generateProblems()">
                    ➕ Addisjon
                </label>
                <label>
                    <input type="checkbox" id="subtraction" checked onchange="generateProblems()">
                    ➖ Subtraksjon
                </label>
                <label>
                    <input type="checkbox" id="multiplication" onchange="generateProblems()">
                    ✖️ Multiplikasjon
                </label>
                <label>
                    <input type="checkbox" id="division" onchange="generateProblems()">
                    ➗ Divisjon
                </label>
            </div>
        </div>

        <div class="problems-container" id="problemsContainer"></div>

        <div class="info">
            <p>Klikk på "Nye oppgaver" for å få nye regnestykker!</p>
        </div>
    </div>

    <script>
        let isLineFormat = true;
        let problems = [];
        let showAnswers = false;

        function getRandomNumber(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function getEnabledOperations() {
            const operations = [];
            if (document.getElementById('addition').checked) operations.push('addition');
            if (document.getElementById('subtraction').checked) operations.push('subtraction');
            if (document.getElementById('multiplication').checked) operations.push('multiplication');
            if (document.getElementById('division').checked) operations.push('division');
            return operations.length > 0 ? operations : ['addition']; // Default to addition if none selected
        }

        function generateProblem(operation) {
            let num1, num2, operator, answer;

            switch(operation) {
                case 'addition':
                    num1 = getRandomNumber(1, 20);
                    num2 = getRandomNumber(1, 20);
                    operator = '+';
                    answer = num1 + num2;
                    break;

                case 'subtraction':
                    num1 = getRandomNumber(10, 30);
                    num2 = getRandomNumber(1, num1); // Ensure positive result
                    operator = '−';
                    answer = num1 - num2;
                    break;

                case 'multiplication':
                    num1 = getRandomNumber(1, 10);
                    num2 = getRandomNumber(1, 10);
                    operator = '×';
                    answer = num1 * num2;
                    break;

                case 'division':
                    num2 = getRandomNumber(2, 10);
                    answer = getRandomNumber(1, 10);
                    num1 = num2 * answer; // Ensure whole number result
                    operator = '÷';
                    break;
            }

            return { num1, num2, operator, answer };
        }

        function generateProblems() {
            const operations = getEnabledOperations();
            problems = [];

            // Generate 15 problems
            for (let i = 0; i < 15; i++) {
                const randomOperation = operations[Math.floor(Math.random() * operations.length)];
                problems.push(generateProblem(randomOperation));
            }

            showAnswers = false;
            renderProblems();
        }

        function renderProblems() {
            const container = document.getElementById('problemsContainer');
            container.innerHTML = '';

            problems.forEach((problem, index) => {
                const div = document.createElement('div');
                div.className = `problem ${isLineFormat ? 'line-format' : 'vertical-format'}`;

                if (isLineFormat) {
                    div.innerHTML = `
                        <span>${problem.num1} ${problem.operator} ${problem.num2} =</span>
                        <span class="line-answer ${showAnswers ? '' : 'hidden'}">${problem.answer}</span>
                    `;
                } else {
                    div.innerHTML = `
                        <div class="vertical-row vertical-top">${problem.num1}</div>
                        <div class="vertical-row vertical-operation">
                            <span>${problem.operator}</span>
                            <span>${problem.num2}</span>
                        </div>
                        <div class="vertical-line"></div>
                        <div class="vertical-row vertical-answer ${showAnswers ? '' : 'hidden'}">${problem.answer}</div>
                    `;
                }

                container.appendChild(div);
            });
        }

        function toggleFormat() {
            isLineFormat = !isLineFormat;
            renderProblems();
        }

        function toggleAnswers() {
            showAnswers = !showAnswers;
            renderProblems();
        }

        // Generate initial problems on page load
        generateProblems();
    </script>
</body>
</html>
