<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matteøving</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        @media (min-width: 768px) {
            body {
                padding: 20px;
            }

            .container {
                padding: 30px;
            }
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        @media (min-width: 768px) {
            h1 {
                font-size: 2.5em;
                margin-bottom: 30px;
            }
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        @media (min-width: 768px) {
            .controls {
                gap: 15px;
                margin-bottom: 30px;
                padding: 20px;
            }
        }

        .button {
            padding: 10px 16px;
            font-size: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            flex: 1 1 auto;
            min-width: 120px;
        }

        @media (min-width: 768px) {
            .button {
                padding: 12px 24px;
                font-size: 16px;
                flex: 0 1 auto;
                min-width: auto;
            }
        }

        .button-primary {
            background: #667eea;
            color: white;
        }

        .button-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .button-secondary {
            background: #48bb78;
            color: white;
        }

        .button-secondary:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        .settings {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .settings label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            cursor: pointer;
            padding: 6px 10px;
            background: white;
            border-radius: 6px;
            transition: background 0.2s;
        }

        @media (min-width: 768px) {
            .settings label {
                gap: 8px;
                font-size: 16px;
                padding: 8px 15px;
            }
        }

        .settings label:hover {
            background: #e2e8f0;
        }

        .settings input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .problems-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        @media (min-width: 480px) {
            .problems-container {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 15px;
            }
        }

        @media (min-width: 768px) {
            .problems-container {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 20px;
                margin-top: 20px;
            }
        }

        .problem {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #2d3748;
            border: 3px solid #e2e8f0;
            transition: all 0.3s;
        }

        @media (min-width: 768px) {
            .problem {
                padding: 20px;
                font-size: 24px;
            }
        }

        .problem:hover {
            border-color: #667eea;
            transform: scale(1.05);
        }

        .problem.line-format {
            font-size: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .line-equation {
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        @media (min-width: 768px) {
            .problem.line-format {
                font-size: 24px;
            }

            .line-equation {
                gap: 8px;
            }
        }

        .answer-input {
            width: 60px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            border: 2px solid #cbd5e0;
            border-radius: 6px;
            padding: 2px 4px;
            outline: none;
            background: white;
            color: #2d3748;
            transition: border-color 0.2s;
            -moz-appearance: textfield;
        }

        .answer-input::-webkit-outer-spin-button,
        .answer-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }

        .answer-input:focus {
            border-color: #667eea;
        }

        .answer-input.correct {
            border-color: #48bb78;
            background: #f0fff4;
            color: #276749;
        }

        .answer-input.wrong {
            border-color: #fc8181;
            background: #fff5f5;
            color: #c53030;
        }

        .correct-answer-hint {
            font-size: 13px;
            color: #48bb78;
            font-weight: bold;
        }

        @media (min-width: 768px) {
            .answer-input {
                width: 70px;
                font-size: 22px;
            }
        }

        .problem.correct-border {
            border-color: #48bb78;
            background: #f0fff4;
        }

        .problem.wrong-border {
            border-color: #fc8181;
            background: #fff5f5;
        }

        .score-banner {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.3em;
            font-weight: bold;
            margin-top: 20px;
            display: none;
        }

        .score-banner.show {
            display: block;
        }

        .score-banner.great {
            background: #f0fff4;
            color: #276749;
            border: 2px solid #48bb78;
        }

        .score-banner.ok {
            background: #fffbeb;
            color: #744210;
            border: 2px solid #f6ad55;
        }

        .score-banner.poor {
            background: #fff5f5;
            color: #c53030;
            border: 2px solid #fc8181;
        }

        .problem.vertical-format {
            background: white;
            border: 3px solid #2d3748;
            border-radius: 10px;
            padding: 15px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            font-family: 'Courier New', monospace;
        }

        @media (min-width: 768px) {
            .problem.vertical-format {
                padding: 20px;
                min-height: 150px;
            }
        }

        .vertical-row {
            font-size: 24px;
            font-weight: bold;
            line-height: 1.4;
            text-align: right;
            width: 100%;
        }

        @media (min-width: 768px) {
            .vertical-row {
                font-size: 32px;
            }
        }

        .vertical-top {
            padding-right: 10px;
        }

        .vertical-operation {
            padding-right: 10px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 5px;
        }

        .vertical-line {
            width: 100%;
            height: 3px;
            background: #2d3748;
            margin: 8px 0;
        }

        .vertical-answer {
            padding-right: 10px;
            min-height: 35px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
        }

        @media (min-width: 768px) {
            .vertical-answer {
                min-height: 45px;
            }
        }

        .info {
            text-align: center;
            margin-top: 20px;
            color: #718096;
            font-style: italic;
        }

        @media (max-width: 479px) {
            .problems-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Matteøving</h1>

        <div style="text-align:center; margin-bottom: 20px; display:flex; flex-wrap:wrap; gap:12px; justify-content:center; align-items:center;">
            <input type="text" id="playerName" placeholder="Skriv navnet ditt her..." maxlength="30"
                style="font-size: 1.1em; padding: 10px 16px; border: 2px solid #e2e8f0; border-radius: 8px; outline: none; text-align: center; width: 100%; max-width: 280px; transition: border-color 0.2s;"
                onfocus="this.style.borderColor='#667eea'" onblur="this.style.borderColor='#e2e8f0'">
            <select id="ageSelect" onchange="generateProblems()"
                style="font-size: 1.1em; padding: 10px 16px; border: 2px solid #e2e8f0; border-radius: 8px; outline: none; cursor: pointer; background: white; color: #2d3748; transition: border-color 0.2s;"
                onfocus="this.style.borderColor='#667eea'" onblur="this.style.borderColor='#e2e8f0'">
                <option value="5">5 år</option>
                <option value="6">6 år</option>
                <option value="7">7 år</option>
                <option value="8">8 år</option>
                <option value="9">9 år</option>
                <option value="10" selected>10 år</option>
                <option value="11">11 år</option>
                <option value="12">12 år</option>
                <option value="13">13 år</option>
                <option value="14">14 år</option>
                <option value="15">15 år</option>
            </select>
        </div>

        <div class="controls">
            <button class="button button-primary" onclick="toggleFormat()">
                📝 Bytt format
            </button>
            <button class="button button-secondary" onclick="generateProblems()">
                🎲 Nye oppgaver
            </button>
            <button class="button button-primary" onclick="checkAnswers()">
                👁️ FASIT
            </button>
        </div>

        <div class="controls">
            <div class="settings">
                <label>
                    <input type="checkbox" id="addition" checked onchange="generateProblems()">
                    ➕ Addisjon
                </label>
                <label>
                    <input type="checkbox" id="subtraction" checked onchange="generateProblems()">
                    ➖ Subtraksjon
                </label>
                <label>
                    <input type="checkbox" id="multiplication" onchange="generateProblems()">
                    ✖️ Multiplikasjon
                </label>
                <label>
                    <input type="checkbox" id="division" onchange="generateProblems()">
                    ➗ Divisjon
                </label>
            </div>
        </div>

        <div class="problems-container" id="problemsContainer"></div>

        <div class="score-banner" id="scoreBanner"></div>

        <div class="info">
            <p>Klikk på "Nye oppgaver" for å få nye regnestykker!</p>
        </div>
    </div>

    <script>
        let isLineFormat = true;
        let problems = [];
        let checked = false;

        function getRandomNumber(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function getEnabledOperations() {
            const operations = [];
            if (document.getElementById('addition').checked) operations.push('addition');
            if (document.getElementById('subtraction').checked) operations.push('subtraction');
            if (document.getElementById('multiplication').checked) operations.push('multiplication');
            if (document.getElementById('division').checked) operations.push('division');
            return operations.length > 0 ? operations : ['addition'];
        }

        function getDifficultyByAge() {
            const age = parseInt(document.getElementById('ageSelect').value);
            // Returns { addMax, subMax, mulMax, divMax }
            if (age <= 5)  return { addMax: 5,    subMax: 5,    mulMax: 2,  divMax: 2  };
            if (age === 6) return { addMax: 10,   subMax: 10,   mulMax: 3,  divMax: 3  };
            if (age === 7) return { addMax: 20,   subMax: 15,   mulMax: 5,  divMax: 5  };
            if (age === 8) return { addMax: 30,   subMax: 20,   mulMax: 7,  divMax: 7  };
            if (age === 9) return { addMax: 50,   subMax: 40,   mulMax: 9,  divMax: 9  };
            if (age === 10)return { addMax: 100,  subMax: 50,   mulMax: 10, divMax: 10 };
            if (age === 11)return { addMax: 150,  subMax: 100,  mulMax: 12, divMax: 12 };
            if (age === 12)return { addMax: 200,  subMax: 150,  mulMax: 15, divMax: 15 };
            if (age === 13)return { addMax: 500,  subMax: 300,  mulMax: 20, divMax: 20 };
            if (age === 14)return { addMax: 1000, subMax: 500,  mulMax: 25, divMax: 25 };
            return             { addMax: 1000, subMax: 1000, mulMax: 30, divMax: 30 };
        }

        function generateProblem(operation) {
            const d = getDifficultyByAge();
            let num1, num2, operator, answer;
            switch(operation) {
                case 'addition':
                    num1 = getRandomNumber(1, d.addMax);
                    num2 = getRandomNumber(1, d.addMax);
                    operator = '+';
                    answer = num1 + num2;
                    break;
                case 'subtraction':
                    num1 = getRandomNumber(Math.floor(d.subMax / 2), d.subMax);
                    num2 = getRandomNumber(1, num1);
                    operator = '−';
                    answer = num1 - num2;
                    break;
                case 'multiplication':
                    num1 = getRandomNumber(1, d.mulMax);
                    num2 = getRandomNumber(1, d.mulMax);
                    operator = '×';
                    answer = num1 * num2;
                    break;
                case 'division':
                    num2 = getRandomNumber(2, d.divMax);
                    answer = getRandomNumber(1, d.divMax);
                    num1 = num2 * answer;
                    operator = '÷';
                    break;
            }
            return { num1, num2, operator, answer };
        }

        function generateProblems() {
            const operations = getEnabledOperations();
            problems = [];
            for (let i = 0; i < 15; i++) {
                const op = operations[Math.floor(Math.random() * operations.length)];
                problems.push(generateProblem(op));
            }
            checked = false;
            hideBanner();
            renderProblems();
        }

        function renderProblems() {
            const container = document.getElementById('problemsContainer');
            container.innerHTML = '';

            problems.forEach((problem, index) => {
                const div = document.createElement('div');
                div.className = `problem ${isLineFormat ? 'line-format' : 'vertical-format'}`;

                if (isLineFormat) {
                    div.innerHTML = `
                        <div class="line-equation">
                            <span>${problem.num1} ${problem.operator} ${problem.num2} =</span>
                            <input class="answer-input" type="number" id="input-${index}" placeholder="?" autocomplete="off">
                        </div>
                        <span class="correct-answer-hint" id="hint-${index}"></span>
                    `;
                } else {
                    div.innerHTML = `
                        <div class="vertical-row vertical-top">${problem.num1}</div>
                        <div class="vertical-row vertical-operation">
                            <span>${problem.operator}</span>
                            <span>${problem.num2}</span>
                        </div>
                        <div class="vertical-line"></div>
                        <div class="vertical-answer">
                            <input class="answer-input" type="number" id="input-${index}" placeholder="?" autocomplete="off">
                            <span class="correct-answer-hint" id="hint-${index}"></span>
                        </div>
                    `;
                }

                container.appendChild(div);
            });
        }

        function checkAnswers() {
            let correct = 0;
            const cards = document.querySelectorAll('.problem');

            problems.forEach((problem, index) => {
                const input = document.getElementById(`input-${index}`);
                const card = cards[index];
                const userAnswer = parseInt(input.value, 10);

                if (input.value === '') {
                    input.classList.remove('correct', 'wrong');
                    card.classList.remove('correct-border', 'wrong-border');
                    return;
                }

                const hint = document.getElementById(`hint-${index}`) || card.querySelector('.correct-answer-hint');

                if (userAnswer === problem.answer) {
                    correct++;
                    input.classList.add('correct');
                    input.classList.remove('wrong');
                    card.classList.add('correct-border');
                    card.classList.remove('wrong-border');
                    if (hint) hint.textContent = '';
                } else {
                    input.classList.add('wrong');
                    input.classList.remove('correct');
                    card.classList.add('wrong-border');
                    card.classList.remove('correct-border');
                    if (hint) hint.textContent = `✓ ${problem.answer}`;
                }
            });

            const answered = [...problems.keys()].filter(i => document.getElementById(`input-${i}`).value !== '').length;
            showBanner(correct, answered);
            checked = true;
        }

        function showBanner(correct, total) {
            const banner = document.getElementById('scoreBanner');
            const name = document.getElementById('playerName').value.trim();
            const pct = total === 0 ? 0 : correct / total;
            let emoji, msg, cls;

            if (total === 0) {
                banner.className = 'score-banner show ok';
                banner.textContent = 'Fyll inn svarene og trykk FASIT! ✏️';
                return;
            }

            if (pct === 1)       { emoji = '🌟'; msg = 'Perfekt!';     cls = 'great'; }
            else if (pct >= 0.7) { emoji = '👍'; msg = 'Bra jobbet!';  cls = 'ok'; }
            else                 { emoji = '💪'; msg = 'Øv litt til!'; cls = 'poor'; }

            const nameSuffix = name ? ` ${name}!` : '!';
            banner.className = `score-banner show ${cls}`;
            banner.textContent = `${emoji} ${correct} av ${total} riktige — ${msg.replace('!', '')}${nameSuffix}`;
        }

        function hideBanner() {
            document.getElementById('scoreBanner').className = 'score-banner';
        }

        function toggleFormat() {
            isLineFormat = !isLineFormat;
            checked = false;
            hideBanner();
            renderProblems();
        }

        // Generate initial problems on page load
        generateProblems();
    </script>
</body>
</html>
